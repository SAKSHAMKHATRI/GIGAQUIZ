<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="login.css">
    <title>Login Page</title>
</head>
<body>
    <div class="container">
        <div class="form-container">
            <!-- Login Form -->
            <form class="form" id="login-form" onsubmit="loginUser(event)">
                <h2>Login</h2>
                <input type="text" id="login-username" placeholder="Username" required>
                <input type="password" id="login-password" placeholder="Password" required>
                <button type="submit">Login</button>
                <p>Don't have an account? <a href="#" onclick="toggleForms()">Sign up</a></p>
            </form>

            <!-- Sign Up Form -->
            <form class="form hidden" id="signup-form" onsubmit="signupUser(event)">
                <h2>Sign Up</h2>
                <input type="text" id="signup-username" placeholder="Username" required>
                <input type="email" id="signup-email" placeholder="Email" required>
                <input type="password" id="signup-password" placeholder="Password" required>
                <button type="submit">Sign Up</button>
                <p>Already have an account? <a href="#" onclick="toggleForms()">Login</a></p>
            </form>
        </div>
    </div>

    <!-- Modal for Messages -->
    <div id="message-modal" class="modal hidden">
        <div class="modal-content">
            <span class="close-btn" onclick="closeModal()">&times;</span>
            <h2 id="modal-heading"></h2>
            <p id="modal-message"></p>
            <button id="modal-button" onclick="closeModal()">OK</button>
        </div>
    </div>

    <script>
        // Toggle between Login and Sign Up forms
        function toggleForms() {
            const loginForm = document.getElementById('login-form');
            const signupForm = document.getElementById('signup-form');
            loginForm.classList.toggle('hidden');
            signupForm.classList.toggle('hidden');
        }

        // Store user credentials during sign-up
        function signupUser(event) {
            event.preventDefault(); // Prevent default form submission
            
            const username = document.getElementById("signup-username").value;
            const email = document.getElementById("signup-email").value;
            const password = document.getElementById("signup-password").value;

            // Store credentials in localStorage
            const userData = { username, email, password };
            localStorage.setItem("user", JSON.stringify(userData));

            showModal("Success", `Account created for ${username}! Please log in.`);
            toggleForms();
        }

        // Validate credentials during login
        function loginUser(event) {
            event.preventDefault(); // Prevent default form submission

            const username = document.getElementById("login-username").value;
            const password = document.getElementById("login-password").value;

            // Retrieve stored user data
            const storedData = JSON.parse(localStorage.getItem("user"));

            if (storedData && storedData.username === username && storedData.password === password) {
                // Store user info in localStorage for the user page
                localStorage.setItem('username', storedData.username);
                localStorage.setItem('email', storedData.email);

                // Mark the user as logged in
                localStorage.setItem('loggedIn', 'true');

                showModal("Welcome", `Hello, ${username}! You have successfully logged in.`);

                // Redirect to user menu page after showing the modal
                document.getElementById("modal-button").onclick = () => {
                    window.location.href = "./ques.html";  // Redirect to the main page
                };
            } else {
                showModal("Error", "Invalid username or password. Please try again.");
            }
        }

        // Show modal with a message
        function showModal(heading, message) {
            document.getElementById("modal-heading").textContent = heading;
            document.getElementById("modal-message").textContent = message;
            document.getElementById("message-modal").classList.remove("hidden");
        }

        // Close the modal
        function closeModal() {
            document.getElementById("message-modal").classList.add("hidden");
        }
    </script>
</body>
</html>
